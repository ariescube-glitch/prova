<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wakeify 365</title>
  <meta name="description" content="Una citazione potenziante al giorno per 365 giorni, in stile Wakeify.">
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0f172a; /* sfondo blu notte */
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      border-radius: 24px;
      padding: 20px 18px 16px;
      background: radial-gradient(circle at top, #1d4ed8, #020617);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bfdbfe;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.9rem;
      color: #cbd5f5;
      opacity: 0.9;
    }

    .date {
      text-align: center;
      font-size: 0.9rem;
      text-transform: capitalize;
      color: #a5b4fc;
      margin-bottom: 12px;
    }

    .quote-card {
      background: rgba(15,23,42,0.8);
      border-radius: 18px;
      padding: 16px 14px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(129,140,248,0.4);
      margin-bottom: 10px;
    }

    .quote-text {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .quote-mark {
      font-size: 1.3rem;
      opacity: 0.7;
      margin: 0 4px;
      vertical-align: top;
    }

    .quote-author {
      text-align: right;
      font-size: 0.9rem;
      color: #93c5fd;
      font-weight: 500;
    }

    .quote-note {
      font-size: 0.85rem;
      color: #e5e7eb;
      opacity: 0.9;
      margin-bottom: 4px;
    }

    .quote-note span {
      opacity: 0.7;
      font-weight: 500;
    }

    footer {
      margin-top: 10px;
      text-align: center;
      font-size: 0.7rem;
      color: #9ca3af;
      opacity: 0.8;
    }

    footer strong {
      font-weight: 600;
      color: #e5e7eb;
    }
  
    /* Archivio citazioni */
    .archive-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin: 12px 0 4px;
      flex-wrap: wrap;
    }

    .archive-button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(129,140,248,0.6);
      background: rgba(15,23,42,0.8);
      color: #e5e7eb;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .archive-button:hover {
      border-color: rgba(191,219,254,0.8);
    }

    .archive-date {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(129,140,248,0.6);
      background: rgba(15,23,42,0.8);
      color: #e5e7eb;
      font-size: 0.85rem;
    }

    .archive-hint {
      text-align: center;
      font-size: 0.78rem;
      color: #cbd5f5;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .archive-mode {
      text-align: center;
      font-size: 0.72rem;
      color: #93c5fd;
      opacity: 0.9;
      margin-top: 2px;
    }

</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Wakeify 365</h1>
      <p>Una frase al giorno per svegliare il tuo potenziale.</p>
    </header>

    <p id="date-label" class="date"></p>

    <section class="quote-card">
      <p id="quote-text" class="quote-text">
        <span class="quote-mark">“</span>
        <span id="quote-text-content"></span>
        <span class="quote-mark">”</span>
      </p>
      <p id="quote-author" class="quote-author"></p>
    </section>

    <p id="quote-note" class="quote-note"></p>

    <div class="archive-bar">
      <button id="btn-archive" class="archive-button" type="button">Archivio</button>
      <input id="archive-date" class="archive-date" type="date" aria-label="Seleziona una data passata">
    </div>
    <p id="archive-hint" class="archive-hint">Scegli una data passata per rileggere la citazione.</p>
    <p id="archive-mode" class="archive-mode" style="display:none;">Stai rileggendo una citazione dall’archivio.</p>

    <footer>
      <span>Creato con <span aria-hidden="true">♥</span> per accompagnarti ogni giorno.</span><br>
      <strong>by Wakeify</strong><br>
      <a href="https://wakeifycoaching.com" style="font-size:0.8rem; color:#93c5fd; text-decoration:underline; display:inline-block; margin-top:4px;">
        Visita il sito Wakeify →
      </a>
    </footer>
  </div>

  <script>
    /**
     * NUOVO SISTEMA: CALENDARIO PER DATA
     * ----------------------------------
     * La chiave è "GG-MM".
     * Esempio: "01-01" = 1 gennaio, "25-12" = 25 dicembre.
     * L'utente vede sempre la data reale del dispositivo,
     * ma la citazione viene presa esattamente dalla mappa qui sotto.
     */

    const calendarQuotes = {
      // GENNAIO
      "01-01": {
  text: "Ogni inizio chiede presenza, non perfezione.",
  author: "Wakeify",
  note: "Scrivi una sola parola che vuoi portare con te quest’anno."
},

"02-01": {
  text: "La direzione conta più della velocità.",
  author: "Wakeify",
  note: "Scegli oggi una piccola azione coerente con la parola di ieri."
},

"03-01": {
  text: "Ciò che fai anche quando non ne hai voglia costruisce il tuo percorso.",
  author: "Wakeify",
  note: "Fai oggi una cosa utile anche senza entusiasmo."
},

"04-01": {
  text: "Diventi ciò che ripeti.",
  author: "Wakeify",
  note: "Osserva un’abitudine quotidiana e chiediti dove ti sta portando."
},

"05-01": {
  text: "Non tutto ciò che pesa è necessario.",
  author: "Wakeify",
  note: "Elimina oggi una cosa superflua: un oggetto, un impegno o un pensiero."
},

"06-01": {
  text: "Lasciare andare è una forma di fiducia.",
  author: "Wakeify",
  note: "Chiudi consapevolmente qualcosa che tieni aperto per abitudine."
},

"07-01": {
  text: "Ogni percorso serio ha bisogno di pazienza.",
  author: "Wakeify",
  note: "Accetta di andare piano senza fermarti."
},

"08-01": {
  text: "La chiarezza è una forma di rispetto verso te stesso.",
  author: "Wakeify",
  note: "Chiarisci oggi un confine: un sì più onesto o un no più netto."
},

"09-01": {
  text: "Non sei in ritardo: sei in cammino.",
  author: "Wakeify",
  note: "Smetti di confrontarti e torna al tuo passo."
},

"10-01": {
  text: "Il cambiamento vero è spesso silenzioso.",
  author: "Wakeify",
  note: "Riconosci un progresso che solo tu puoi vedere."
},

"11-01": {
  text: "Dire no libera energia vitale.",
  author: "Wakeify",
  note: "Rinuncia oggi a qualcosa che non è davvero tuo."
},

"12-01": {
  text: "La coerenza è fare ciò che hai detto, anche quando nessuno guarda.",
  author: "Wakeify",
  note: "Mantieni una promessa fatta a te stesso."
},

"13-01": {
  text: "Non serve controllare tutto per andare avanti.",
  author: "Wakeify",
  note: "Lascia oggi uno spazio non programmato nella tua giornata."
},

"14-01": {
  text: "La gentilezza è lucidità, non debolezza.",
  author: "Wakeify",
  note: "Sii intenzionalmente gentile con una persona difficile."
},

"15-01": {
  text: "A metà strada si aggiusta il passo.",
  author: "Wakeify",
  note: "Rivedi l’intenzione iniziale e correggila se serve."
},

"16-01": {
  text: "La responsabilità inizia da ciò che puoi fare oggi.",
  author: "Wakeify",
  note: "Chiediti: cosa dipende davvero da me, adesso?"
},

"17-01": {
  text: "Ascoltare è un atto di coraggio.",
  author: "Wakeify",
  note: "Ascolta qualcuno senza interrompere e senza consigliare."
},

"18-01": {
  text: "Il corpo è parte del percorso, non un ostacolo.",
  author: "Wakeify",
  note: "Muoviti oggi anche solo per cinque minuti, con presenza."
},

"19-01": {
  text: "Non tutto va capito subito.",
  author: "Wakeify",
  note: "Accetta un dubbio senza cercare risposta immediata."
},

"20-01": {
  text: "La cura quotidiana batte l’entusiasmo occasionale.",
  author: "Wakeify",
  note: "Scegli un ‘minimo vitale’ sostenibile (5 minuti) e fallo oggi: lettura, movimento o ordine."
},

"21-01": {
  text: "Ogni persona è più della sua funzione.",
  author: "Wakeify",
  note: "Guarda qualcuno oggi senza ridurlo a un ruolo."
},

"22-01": {
  text: "La libertà cresce con la consapevolezza.",
  author: "Wakeify",
  note: "Informati su qualcosa che dai per scontato."
},

"23-01": {
  text: "Ricordare è una forma di responsabilità.",
  author: "Wakeify",
  note: "Rifletti su un fatto storico o personale che non va banalizzato."
},

"24-01": {
  text: "Le parole costruiscono realtà.",
  author: "Wakeify",
  note: "Scegli oggi una parola più giusta, non solo più comoda."
},

"25-01": {
  text: "Il silenzio, a volte, è rispetto.",
  author: "Wakeify",
  note: "Taci dove non è necessario parlare."
},

"26-01": {
  text: "La memoria non è automatica: va coltivata.",
  author: "Wakeify",
  note: "Preparati al domani: leggi, ascolta, informati."
},

"27-01": {
  text: "È avvenuto, quindi può accadere di nuovo.",
  author: "Primo Levi — Wakeify",
  note: "Leggi una testimonianza o un nome. La memoria è responsabilità."
},

"28-01": {
  text: "Dopo il ricordo viene la responsabilità.",
  author: "Wakeify",
  note: "Chiediti oggi cosa puoi fare per non essere indifferente."
},

"29-01": {
  text: "Ogni giorno è anche una scelta morale.",
  author: "Wakeify",
  note: "Agisci come se qualcuno imparasse da te."
},

"30-01": {
  text: "Il cambiamento duraturo è discreto.",
  author: "Wakeify",
  note: "Continua il percorso anche senza risultati immediati."
},

"31-01": {
  text: "Ciò che hai iniziato merita continuità.",
  author: "Wakeify",
  note: "Riconosci il cammino fatto questo mese e scegli di proseguire."
},

// FEBBRAIO
      "01-02": {
  text: "Ascoltare è il primo atto di rispetto.",
  author: "Wakeify",
  note: "Fermati un momento oggi e presta attenzione a ciò che senti davvero."
},

"02-02": {
  text: "Il silenzio è uno spazio attivo, non un vuoto.",
  author: "Wakeify",
  note: "Concediti cinque minuti senza stimoli né parole."
},

"03-02": {
  text: "Capirsi richiede più tempo che giudicare.",
  author: "Wakeify",
  note: "Rallenta una reazione che avresti dato d’impulso."
},

"04-02": {
  text: "Ascoltare è un atto di rispetto verso l’altro.",
  author: "Wakeify",
  note: "Lascia parlare qualcuno senza interrompere."
},

"05-02": {
  text: "Non tutto chiede risposta: a volte chiede presenza.",
  author: "Wakeify",
  note: "Sii presente senza cercare di risolvere."
},

"06-02": {
  text: "La fretta impedisce di capire.",
  author: "Wakeify",
  note: "Fai oggi una cosa con lentezza intenzionale."
},

"07-02": {
  text: "Le emozioni non vanno corrette, vanno ascoltate.",
  author: "Wakeify",
  note: "Dai un nome a ciò che senti, senza giudicarlo."
},

"08-02": {
  text: "Il corpo parla anche quando la mente tace.",
  author: "Wakeify",
  note: "Ascolta un segnale fisico che stai ignorando."
},

"09-02": {
  text: "Capire l’altro inizia dal sospendere il giudizio.",
  author: "Wakeify",
  note: "Prova a non etichettare una persona oggi."
},

"10-02": {
  text: "L’ascolto profondo crea spazio.",
  author: "Wakeify",
  note: "Concedi spazio a qualcuno senza riempirlo."
},

"11-02": {
  text: "Le parole non dette parlano comunque.",
  author: "Wakeify",
  note: "Chiediti cosa stai evitando di dire."
},

"12-02": {
  text: "Ascoltare se stessi richiede coraggio.",
  author: "Wakeify",
  note: "Accogli un pensiero scomodo senza respingerlo."
},

"13-02": {
  text: "Il silenzio è un alleato, non un vuoto.",
  author: "Wakeify",
  note: "Rimani in silenzio per qualche minuto, senza distrazioni."
},

"14-02": {
  text: "L’ascolto è una forma di amore.",
  author: "Wakeify",
  note: "Dedica attenzione piena a qualcuno che ami."
},

"15-02": {
  text: "Quando ascolti davvero, smetti di difenderti.",
  author: "Wakeify",
  note: "Accogli un punto di vista diverso dal tuo."
},

"16-02": {
  text: "La chiarezza nasce dall’ascolto onesto.",
  author: "Wakeify",
  note: "Chiediti cosa stai evitando di ammettere."
},

"17-02": {
  text: "Non tutto ciò che senti richiede una risposta immediata.",
  author: "Wakeify",
  note: "Prenditi tempo prima di reagire."
},

"18-02": {
  text: "Ascoltare è un atto di rispetto verso se stessi.",
  author: "Wakeify",
  note: "Riconosci un tuo bisogno oggi."
},

"19-02": {
  text: "Il silenzio prepara comprensione.",
  author: "Wakeify",
  note: "Spegni un rumore superfluo intorno a te."
},

"20-02": {
  text: "Ogni ascolto autentico crea connessione.",
  author: "Wakeify",
  note: "Cerca un dialogo sincero oggi."
},

"21-02": {
  text: "Ascoltare non è cedere, è comprendere.",
  author: "Wakeify",
  note: "Apriti a un punto di vista diverso dal tuo."
},

"22-02": {
  text: "Ciò che ignori tende a tornare.",
  author: "Wakeify",
  note: "Presta attenzione a ciò che eviti da tempo."
},

"23-02": {
  text: "L’ascolto profondo cambia il modo di guardare.",
  author: "Wakeify",
  note: "Osserva senza giudicare una situazione complessa."
},

"24-02": {
  text: "Il silenzio è una risposta quando è scelto.",
  author: "Wakeify",
  note: "Concediti uno spazio senza parole."
},

"25-02": {
  text: "Essere presenti è un atto di rispetto.",
  author: "Wakeify",
  note: "Sii presente in una conversazione, senza distrazioni."
},

"26-02": {
  text: "Ascoltare è un modo di prendersi cura.",
  author: "Wakeify",
  note: "Offri attenzione senza cercare nulla in cambio."
},

"27-02": {
  text: "Comprendere richiede tempo e apertura.",
  author: "Wakeify",
  note: "Rallenta il giudizio, amplia lo sguardo."
},

"28-02": {
  text: "Quando ascolti davvero, qualcosa cambia.",
  author: "Wakeify",
  note: "Chiudi il mese osservando ciò che ora senti con più chiarezza."
},

// MARZO
  "01-03": {
  "text": "Un valore esiste solo quando orienta una scelta.",
  "author": "Wakeify",
  "note": "Definisci un valore che vuoi rendere operativo questo mese."
},

"02-03": {
  "text": "La chiarezza interiore nasce quando smetti di rimandare.",
  "author": "Wakeify",
  "note": "Elenca una decisione che stai evitando."
},

"03-03": {
  "text": "Ogni valore richiede una rinuncia.",
  "author": "Wakeify",
  "note": "Scegli consapevolmente a cosa dire no oggi."
},

"04-03": {
  "text": "Dare un nome ai propri valori è un atto di responsabilità.",
  "author": "Wakeify",
  "note": "Stabilisci per iscritto ciò che per te conta davvero."
},

"05-03": {
  "text": "Ciò che non dichiari, difficilmente guiderà le tue azioni.",
  "author": "Wakeify",
  "note": "Dichiara una priorità personale senza giustificarla."
},

"06-03": {
  "text": "La coerenza inizia quando pensiero e azione smettono di separarsi.",
  "author": "Wakeify",
  "note": "Allinea un gesto concreto a una convinzione importante."
},

"07-03": {
  "text": "Scegliere è più faticoso che riflettere, ma è lì che cresci.",
  "author": "Wakeify",
  "note": "Decidi un’azione piccola ma irreversibile."
},

"08-03": {
  "text": "Ogni scelta definisce chi stai diventando.",
  "author": "Wakeify",
  "note": "Escludi una possibilità che non ti rappresenta più."
},

"09-03": {
  "text": "La coerenza non è rigidità, è fedeltà a ciò che conta.",
  "author": "Wakeify",
  "note": "Conferma un impegno preso con te stesso."
},

"10-03": {
  "text": "Un valore senza pratica resta un’idea elegante.",
  "author": "Wakeify",
  "note": "Applica un principio tuo in una situazione reale."
},

"11-03": {
  "text": "La disciplina è il linguaggio quotidiano dei valori.",
  "author": "Wakeify",
  "note": "Mantieni una scelta anche quando è scomoda."
},

"12-03": {
  "text": "Essere coerenti significa accettare le conseguenze.",
  "author": "Wakeify",
  "note": "Assumi la responsabilità di una decisione recente."
},

"13-03": {
  "text": "I valori si misurano nel tempo, non nell’intenzione.",
  "author": "Wakeify",
  "note": "Onora un impegno senza cercare scorciatoie."
},

"14-03": {
  "text": "La coerenza rafforza la fiducia verso se stessi.",
  "author": "Wakeify",
  "note": "Rispetta una regola che ti sei dato."
},

"15-03": {
  "text": "Difendere un valore significa esporsi.",
  "author": "Wakeify",
  "note": "Difendi una scelta anche se non è popolare."
},

"16-03": {
  "text": "Agire in linea con i propri valori riduce il rumore interiore.",
  "author": "Wakeify",
  "note": "Esegui un’azione che hai rimandato per incoerenza."
},

"17-03": {
  "text": "La coerenza costruisce identità.",
  "author": "Wakeify",
  "note": "Sostieni una decisione senza spiegarti troppo."
},

"18-03": {
  "text": "Essere allineati richiede verifiche continue.",
  "author": "Wakeify",
  "note": "Verifica se un’abitudine è ancora coerente con te."
},

"19-03": {
  "text": "Correggere rotta è un segno di forza, non di debolezza.",
  "author": "Wakeify",
  "note": "Correggi un comportamento che tradisce un tuo valore."
},

"20-03": {
  "text": "La coerenza si costruisce anche quando nessuno guarda.",
  "author": "Wakeify",
  "note": "Persevera in una scelta silenziosa ma giusta."
},

"21-03": {
  "text": "I valori veri si dimostrano nei dettagli.",
  "author": "Wakeify",
  "note": "Dimostra coerenza in una piccola azione quotidiana."
},

"22-03": {
  "text": "Ogni giorno coerente rafforza il tuo centro.",
  "author": "Wakeify",
  "note": "Consolida una scelta ripetendola intenzionalmente."
},

"23-03": {
  "text": "La responsabilità personale nasce dall’allineamento.",
  "author": "Wakeify",
  "note": "Rafforza un confine che protegge ciò che sei."
},

"24-03": {
  "text": "Proteggere i propri valori è una forma di rispetto.",
  "author": "Wakeify",
  "note": "Proteggi tempo ed energia da ciò che ti allontana."
},

"25-03": {
  "text": "Quando scegli, rinunci. Quando rinunci, cresci.",
  "author": "Wakeify",
  "note": "Rivendica una scelta senza sensi di colpa."
},

"26-03": {
  "text": "La coerenza rende la vita più semplice, non più facile.",
  "author": "Wakeify",
  "note": "Incorpora un valore in una decisione pratica."
},

"27-03": {
  "text": "Meno contraddizioni, più direzione.",
  "author": "Wakeify",
  "note": "Semplifica una scelta eliminando il superfluo."
},

"28-03": {
  "text": "Essere allineati significa sapere cosa viene prima.",
  "author": "Wakeify",
  "note": "Prioritizza ciò che rispecchia davvero chi sei."
},

"29-03": {
  "text": "I valori diventano visibili solo nell’azione.",
  "author": "Wakeify",
  "note": "Agisci senza attendere conferme esterne."
},

"30-03": {
  "text": "La coerenza è una scelta che si rinnova ogni giorno.",
  "author": "Wakeify",
  "note": "Riconferma un impegno con un gesto concreto."
},

"31-03": {
  "text": "Essere responsabili significa rispondere delle proprie scelte.",
  "author": "Wakeify",
  "note": "Responsabilizza te stesso per una direzione che hai preso."
},
// APRILE
      "01-04": {
  text: "Trasforma l’idea in una frase operativa: se non puoi dirla in 12 parole, non puoi ancora costruirla.",
  author: "Wakeify",
  note: "Definisci il risultato di aprile in una frase da 12 parole max e scrivila in alto nella tua agenda."
},
"02-04": {
  text: "Una visione utile non è un sogno: è un perimetro che taglia via il superfluo.",
  author: "Wakeify",
  note: "Delimita 3 confini: cosa farai, cosa NON farai, cosa rimandi a maggio. Mettili in elenco."
},
"03-04": {
  text: "Non cercare “il progetto perfetto”: cerca il prossimo passaggio verificabile.",
  author: "Wakeify",
  note: "Scomponi il progetto in 5 passaggi numerati, ognuno con un output visibile (file, pagina, messaggio, consegna)."
},
"04-04": {
  text: "La visione si regge su un criterio: come decidi cosa merita tempo.",
  author: "Wakeify",
  note: "Stabilisci 2 criteri di priorità (es. impatto/urgenza) e applicali a tutte le attività previste oggi."
},
"05-04": {
  text: "Se il progetto non ha una definizione di “finito”, resta un’idea che ti consuma energia.",
  author: "Wakeify",
  note: "Scrivi la tua definizione di “finito” con 3 condizioni oggettive (es. consegnato, pubblicato, pagato)."
},
"06-04": {
  text: "La chiarezza non arriva pensando di più: arriva scegliendo cosa misurare.",
  author: "Wakeify",
  note: "Seleziona 1 metrica guida per aprile (numero, tempo o euro) e fissane il target con data 30-04."
},
"07-04": {
  text: "Una visione concreta ha una scadenza, un luogo e un primo blocco di calendario.",
  author: "Wakeify",
  note: "Prenota 2 blocchi da 45 minuti questa settimana dedicati SOLO al progetto e dai loro un titolo preciso."
},

"08-04": {
  text: "Pianificare non è riempire la settimana: è decidere la sequenza corretta.",
  author: "Wakeify",
  note: "Ordina i 5 passaggi del progetto in sequenza logica e indica per ciascuno “dipende da…”."
},
"09-04": {
  text: "Un piano che non prevede attrito è un’illusione elegante.",
  author: "Wakeify",
  note: "Prevedi 2 ostacoli realistici (tempo, energia, persone) e scrivi accanto la contromossa in una riga."
},
"10-04": {
  text: "Il calendario è il punto in cui la volontà smette di essere opinione.",
  author: "Wakeify",
  note: "Assegna a ogni passaggio una data di inizio e una data di fine (anche provvisoria). Niente “quando posso”."
},
"11-04": {
  text: "Non servono tante task: serve la task giusta, ben definita, nel giorno giusto.",
  author: "Wakeify",
  note: "Riduci l’elenco a 3 task settimanali: ognuna deve avere verbo + oggetto + criterio di completamento."
},
"12-04": {
  text: "Se non sai dire quanto dura, stai solo sperando.",
  author: "Wakeify",
  note: "Stima la durata di 3 attività chiave (in minuti) e scrivila accanto: poi mettile davvero in agenda."
},
"13-04": {
  text: "Pianificare è scegliere dove mettere l’energia alta e dove mettere procedure.",
  author: "Wakeify",
  note: "Standardizza 1 attività ripetitiva: crea una checklist di 6 punti e usala oggi stesso."
},
"14-04": {
  text: "Un piano utile ha una sola cosa sacra: la revisione programmata.",
  author: "Wakeify",
  note: "Programma una revisione da 20 minuti per domenica: agenda + lista task + stato avanzamento."
},

"15-04": {
  text: "La disciplina non è durezza: è continuità anche quando l’entusiasmo non collabora.",
  author: "Wakeify",
  note: "Esegui un “minimo non negoziabile” di 10 minuti sul progetto, anche se oggi è una giornata piena."
},
"16-04": {
  text: "L’operatività vera non chiede permesso: apre il file, avvia la chiamata, scrive la prima riga.",
  author: "Wakeify",
  note: "Avvia la sessione con 5 minuti di avvio secco: apri solo gli strumenti necessari, chiudi tutto il resto."
},
"17-04": {
  text: "Fare progressi è togliere attrito, non aggiungere pressione.",
  author: "Wakeify",
  note: "Semplifica l’ambiente: prepara in 10 minuti una “postazione progetto” (file, cartella, note, materiali)."
},
"18-04": {
  text: "La disciplina funziona quando decidi in anticipo cosa fai quando non hai voglia.",
  author: "Wakeify",
  note: "Scrivi un piano IF-THEN: “Se rimando, allora faccio almeno X per 10 minuti” (definisci X)."
},
"19-04": {
  text: "Il progetto avanza quando smetti di negoziare con il tuo calendario.",
  author: "Wakeify",
  note: "Proteggi un blocco da 60 minuti: telefono in modalità aereo, una sola task, timer acceso."
},
"20-04": {
  text: "L’azione misurabile è quella che lascia una traccia controllabile.",
  author: "Wakeify",
  note: "Produci un output concreto oggi: 1 pagina, 1 bozza, 1 schema, 1 email pronta. Salvalo con data nel nome."
},
"21-04": {
  text: "Disciplina operativa significa chiudere cicli: iniziare meno, finire di più.",
  author: "Wakeify",
  note: "Completa 1 attività iniziata e incompleta: chiudila con una spunta e una nota “cosa ho imparato in 1 riga”."
},
"22-04": {
  text: "Revisionare non è giudicarsi: è guardare i dati e correggere la rotta.",
  author: "Wakeify",
  note: "Rileva lo stato: segna % completamento dei 5 passaggi e scrivi cosa manca per arrivare al 100%."
},
"23-04": {
  text: "La revisione utile separa: ciò che funziona, ciò che rallenta, ciò che va eliminato.",
  author: "Wakeify",
  note: "Confronta la settimana reale con quella pianificata: evidenzia 2 deviazioni e scrivi il motivo concreto."
},
"24-04": {
  text: "Adattare è scegliere una nuova priorità, non fare più cose.",
  author: "Wakeify",
  note: "Sostituisci 1 attività a basso impatto con 1 ad alto impatto: scrivi il perché in 2 righe."
},
"25-04": {
  text: "Un progetto solido ha anche un piano di recupero: cosa fai quando salti due giorni.",
  author: "Wakeify",
  note: "Recupera con metodo: pianifica 2 blocchi extra da 30 minuti nei prossimi 4 giorni, con task specifiche."
},
"26-04": {
  text: "Il controllo qualità è chiedersi: questo passo riduce davvero l’incertezza?",
  author: "Wakeify",
  note: "Verifica 1 output: rileggilo e applica 3 criteri (chiarezza, completezza, utilità). Correggi una cosa sola per criterio."
},
"27-04": {
  text: "Revisione significa anche ridare un nome alle cose: titoli chiari, file trovabili, azioni leggibili.",
  author: "Wakeify",
  note: "Rinomina e riordina: sistema 10 file/note del progetto con una convenzione (AAAA-MM-GG_nome)."
},
"28-04": {
  text: "Se non comunichi il progetto a qualcuno, resta fragile: la realtà lo rende più vero.",
  author: "Wakeify",
  note: "Condividi un aggiornamento di 5 righe con una persona: cosa hai fatto, cosa farai, cosa ti serve."
},
"29-04": {
  text: "Gli ultimi giorni non servono a correre: servono a chiudere bene e ridurre debiti aperti.",
  author: "Wakeify",
  note: "Finalizza 2 cose: scegli due “quasi finite” e portale a “finite” con un’azione conclusiva ciascuna."
},
"30-04": {
  text: "Un mese di progetto finisce con una decisione: cosa continui, cosa cambi, cosa lasci.",
  author: "Wakeify",
  note: "Decidi tre mosse per maggio: 1 da mantenere, 1 da modificare, 1 da eliminare. Metti già una data al primo passo."
},
// MAGGIO
      "01-05": {
  text: "La competenza non comincia quando ti senti pronto; comincia quando accetti di iniziare in modo imperfetto.",
  author: "Wakeify",
  note: "Avvia oggi una pratica concreta di 15 minuti su un'abilità che vuoi costruire, senza correggere troppo il modo in cui inizi."
},

"02-05": {
  text: "All'inizio non serve fare bene: serve tornare.",
  author: "Wakeify",
  note: "Ritaglia un momento fisso della giornata e difendilo da almeno una distrazione abituale."
},

"03-05": {
  text: "Ogni allenamento serio nasce da un gesto piccolo ripetuto con meno scuse del giorno prima.",
  author: "Wakeify",
  note: "Scegli un esercizio semplice e completalo due volte, lentamente, invece di cercarne subito uno più difficile."
},

"04-05": {
  text: "Chi aspetta la condizione ideale si allena poco; chi entra nel ritmo lavora anche nel disordine.",
  author: "Wakeify",
  note: "Prepara in anticipo lo spazio, gli strumenti o i materiali che ti serviranno per la pratica di domani."
},

"05-05": {
  text: "L'imprecisione iniziale non è un difetto del percorso: è il suo punto di accesso.",
  author: "Wakeify",
  note: "Accetta oggi una versione grezza del tuo lavoro e portala a termine senza riaprire ogni dettaglio."
},

"06-05": {
  text: "Non serve sentire slancio per iniziare; spesso lo slancio arriva dopo i primi minuti di lavoro.",
  author: "Wakeify",
  note: "Imposta un timer breve e resta sull'attività fino al suono, anche se all'inizio non ne hai voglia."
},

"07-05": {
  text: "Entrare nel ritmo vale più che cercare subito intensità.",
  author: "Wakeify",
  note: "Concludi la giornata annotando l'orario in cui hai lavorato meglio, per ripartire da lì nei prossimi giorni."
},

"08-05": {
  text: "La ripetizione non serve a copiare ieri: serve a fare oggi con meno dispersione.",
  author: "Wakeify",
  note: "Replica la stessa pratica di ieri cambiando un solo elemento misurabile, non tutto insieme."
},

"09-05": {
  text: "Il metodo è ciò che impedisce alla buona volontà di dipendere dall'umore.",
  author: "Wakeify",
  note: "Definisci tre passaggi essenziali della tua routine e seguine l'ordine senza improvvisare."
},

"10-05": {
  text: "Migliorare non significa aggiungere sempre qualcosa; spesso significa togliere ciò che interrompe.",
  author: "Wakeify",
  note: "Elimina oggi un passaggio inutile, un oggetto dispersivo o un'abitudine che rallenta l'esecuzione."
},

"11-05": {
  text: "La qualità cresce quando il gesto diventa più chiaro, non quando diventa più teatrale.",
  author: "Wakeify",
  note: "Ripeti un'attività già nota prestando attenzione soltanto alla precisione del primo minuto."
},

"12-05": {
  text: "Una routine utile non è rigida: è riconoscibile.",
  author: "Wakeify",
  note: "Organizza la tua sessione in blocchi brevi con un inizio e una chiusura sempre uguali."
},

"13-05": {
  text: "Il miglioramento continuo non ha bisogno di novità quotidiane, ma di standard minimi rispettati.",
  author: "Wakeify",
  note: "Fissa per oggi una soglia minima realistica e rispettala anche se non riesci a fare di più."
},

"14-05": {
  text: "Quando il metodo funziona, la mente consuma meno energia per decidere e più per eseguire.",
  author: "Wakeify",
  note: "Verifica a fine pratica quale fase ti ha fatto perdere più tempo e correggila per la sessione successiva."
},

"15-05": {
  text: "La fatica non segnala sempre che stai sbagliando; spesso segnala che stai entrando davvero nel lavoro.",
  author: "Wakeify",
  note: "Attraversa oggi il momento di resistenza aggiungendo cinque minuti oltre il punto in cui vorresti smettere."
},

"16-05": {
  text: "Quando un gesto nuovo smette di essere comodo, comincia a diventare formativo.",
  author: "Wakeify",
  note: "Sostieni un esercizio che trovi scomodo senza cambiarlo subito, osservando dove tende a cedere la tua attenzione."
},

"17-05": {
  text: "La frustrazione è spesso il prezzo della correzione, non la prova della tua incapacità.",
  author: "Wakeify",
  note: "Riduci oggi la velocità di esecuzione e mantieni il controllo invece di inseguire la prestazione."
},

"18-05": {
  text: "Adattarsi non vuol dire abbassare il livello; vuol dire trovare il modo di continuare senza interrompersi.",
  author: "Wakeify",
  note: "Modifica una sola variabile della tua pratica — durata, ritmo o difficoltà — per non saltarla del tutto."
},

"19-05": {
  text: "Chi cresce davvero non evita l'attrito: impara a lavorarci dentro.",
  author: "Wakeify",
  note: "Affronta per prima la parte che rimandi da giorni, prima che il resto della giornata la copra."
},

"20-05": {
  text: "Il punto critico non è cadere di qualità; è non sapere perché stai calando.",
  author: "Wakeify",
  note: "Registra in una riga il punto preciso in cui oggi ti sei irrigidito, distratto o bloccato."
},

"21-05": {
  text: "La resistenza diminuisce meno con le promesse che con l'abitudine di passare comunque all'azione.",
  author: "Wakeify",
  note: "Insisti oggi su una ripetizione in più, breve ma pulita, proprio dopo un errore o un calo di fiducia."
},

"22-05": {
  text: "Consolidare significa rendere affidabile ciò che all'inizio era fragile.",
  author: "Wakeify",
  note: "Stabilisci un format semplice da ripetere nei prossimi tre giorni senza doverlo reinventare ogni volta."
},

"23-05": {
  text: "I primi risultati contano meno come premio e più come prova che il processo sta prendendo forma.",
  author: "Wakeify",
  note: "Raccogli una traccia concreta dei tuoi progressi: un numero, una pagina, una registrazione o una foto del lavoro svolto."
},

"24-05": {
  text: "La crescita stabile ha un ritmo meno spettacolare, ma molto più trasferibile nel tempo.",
  author: "Wakeify",
  note: "Proteggi la continuità scegliendo un obiettivo giornaliero abbastanza piccolo da poter essere mantenuto anche nei giorni pieni."
},

"25-05": {
  text: "Una pratica diventa tua quando non devi più convincerti ogni volta a ricominciare.",
  author: "Wakeify",
  note: "Collega l'attività a un'abitudine già esistente della tua giornata, così da ridurre il margine di rinvio."
},

"26-05": {
  text: "Il risultato visibile è solo la parte finale di molte ripetizioni rimaste invisibili.",
  author: "Wakeify",
  note: "Misura oggi ciò che sai fare meglio rispetto a due settimane fa usando lo stesso criterio di confronto."
},

"27-05": {
  text: "Non tutto ciò che migliora cresce in modo appariscente; spesso migliora perché regge meglio.",
  author: "Wakeify",
  note: "Mantieni la tua pratica anche in versione ridotta, invece di interromperla per mancanza di tempo perfetto."
},

"28-05": {
  text: "La disciplina matura non irrigidisce: rende più semplice continuare bene.",
  author: "Wakeify",
  note: "Snellisci il tuo sistema: lascia pronti solo gli elementi che davvero usi e togli il resto."
},

"29-05": {
  text: "Quando una competenza si consolida, cominci a riconoscere più in fretta l'errore e a correggerlo con meno rumore.",
  author: "Wakeify",
  note: "Rivedi un tuo lavoro recente e correggi un difetto ricorrente senza riscrivere o rifare tutto da capo."
},

"30-05": {
  text: "La continuità non produce miracoli: produce affidabilità, che alla lunga vale di più.",
  author: "Wakeify",
  note: "Bilancia oggi intensità e sostenibilità: fermati con ancora un minimo di energia, non solo quando sei svuotato."
},

"31-05": {
  text: "La prova che stai crescendo non è sentirti arrivato, ma riuscire a continuare con più padronanza di prima.",
  author: "Wakeify",
  note: "Chiudi il mese scegliendo quale pratica porterai in giugno, con una frequenza chiara e un livello minimo già deciso."
},
// GIUGNO
     "01-06": {
  text: "L’energia non arriva tutta insieme. A volte ricomincia da un passo fatto bene.",
  author: "Wakeify",
  note: "Attraversa un tragitto quotidiano a piedi senza usare il telefono, lasciando che il corpo riprenda il ritmo dell’ambiente."
},

"02-06": {
  text: "Il corpo sente prima della mente quando una vita sta tornando viva.",
  author: "Wakeify",
  note: "Allunga lentamente schiena, spalle e gambe appena sveglio, senza fretta e senza musica."
},

"03-06": {
  text: "Restare fermi troppo a lungo spegne anche i pensieri.",
  author: "Wakeify",
  note: "Cammina per almeno venti minuti con passo continuo, osservando come cambia il tuo stato mentale."
},

"04-06": {
  text: "La vitalità non è agitazione. È presenza che circola.",
  author: "Wakeify",
  note: "Respira profondamente per qualche minuto vicino a una finestra aperta prima di iniziare la giornata."
},

"05-06": {
  text: "Ci sono giorni in cui il movimento è una forma di chiarimento.",
  author: "Wakeify",
  note: "Sali le scale lentamente, senza automatismi, percependo il lavoro del corpo in ogni appoggio."
},

"06-06": {
  text: "Un corpo trascurato diventa rumore di fondo. Un corpo ascoltato diventa orientamento.",
  author: "Wakeify",
  note: "Dedica dieci minuti a sistemare uno spazio fisico in cui passi molto tempo, creando più aria e ordine."
},

"07-06": {
  text: "La stanchezza non sempre chiede riposo. A volte chiede circolazione.",
  author: "Wakeify",
  note: "Interrompi volontariamente una lunga fase sedentaria con qualche minuto di movimento libero."
},

"08-06": {
  text: "L’energia stabile vale più dell’entusiasmo intermittente.",
  author: "Wakeify",
  note: "Mantieni oggi un ritmo regolare nei pasti, nei movimenti e nelle pause, evitando accelerazioni inutili."
},

"09-06": {
  text: "Il ritmo personale si costruisce più con continuità che con intensità.",
  author: "Wakeify",
  note: "Organizza la giornata lasciando spazi reali di recupero tra un’attività e l’altra."
},

"10-06": {
  text: "Un’esistenza sostenibile ha un passo riconoscibile.",
  author: "Wakeify",
  note: "Riduci per una sera gli stimoli digitali e nota come cambia la tua energia mentale."
},

"11-06": {
  text: "La forza non è solo spinta. È anche capacità di durare.",
  author: "Wakeify",
  note: "Bevi acqua con maggiore attenzione durante tutta la giornata, senza aspettare la sete."
},

"12-06": {
  text: "Ogni abitudine sana nasce da un gesto piccolo ripetuto abbastanza a lungo.",
  author: "Wakeify",
  note: "Costruisci un breve rituale fisico da ripetere ogni mattina per il resto del mese."
},

"13-06": {
  text: "Il corpo ama ciò che è regolare più di ciò che è eroico.",
  author: "Wakeify",
  note: "Esci all’aria aperta anche solo per pochi minuti nel momento centrale della giornata."
},

"14-06": {
  text: "L’equilibrio non immobilizza: distribuisce bene le energie.",
  author: "Wakeify",
  note: "Sospendi un’attività dispersiva che ti lascia svuotato invece che nutrito."
},

"15-06": {
  text: "Quando l’energia cresce davvero, cambia anche il modo di occupare lo spazio.",
  author: "Wakeify",
  note: "Raddrizza volontariamente la postura ogni volta che te ne accorgi durante la giornata."
},

"16-06": {
  text: "Una presenza viva modifica l’atmosfera prima ancora delle parole.",
  author: "Wakeify",
  note: "Aumenta leggermente il ritmo di una tua attività abituale, mantenendo però lucidità e controllo."
},

"17-06": {
  text: "L’estate espande ciò che hai coltivato nei mesi precedenti.",
  author: "Wakeify",
  note: "Concediti un momento di luce naturale senza fare altro che esserci davvero."
},

"18-06": {
  text: "Muoversi bene significa disperdere meno energia inutile.",
  author: "Wakeify",
  note: "Osserva quali persone o situazioni oggi aumentano la tua vitalità e quali la comprimono."
},

"19-06": {
  text: "La presenza fisica è una forma silenziosa di intenzione.",
  author: "Wakeify",
  note: "Percorri un tratto più lungo del solito evitando fretta e automatismi."
},

"20-06": {
  text: "Non tutto ciò che accelera ti rende più vivo.",
  author: "Wakeify",
  note: "Proteggi almeno mezz’ora senza notifiche, rumori o interruzioni superflue."
},

"21-06": {
  text: "Un’energia ben direzionata illumina senza consumare.",
  author: "Wakeify",
  note: "Concludi la giornata con un gesto fisico intenzionale che segni davvero la chiusura del giorno."
},

"22-06": {
  text: "Anche il recupero è una forma di intelligenza energetica.",
  author: "Wakeify",
  note: "Rallenta deliberatamente almeno un momento della giornata che di solito vivi di corsa."
},

"23-06": {
  text: "Chi conosce il proprio ritmo evita molte dispersioni inutili.",
  author: "Wakeify",
  note: "Esamina quali impegni ti stanno facendo spendere più energia di quella che restituiscono."
},

"24-06": {
  text: "La lucidità cresce quando il corpo smette di essere trascurato.",
  author: "Wakeify",
  note: "Sdraiati qualche minuto in silenzio senza stimoli esterni, lasciando distendere il sistema nervoso."
},

"25-06": {
  text: "Ci sono forze che aumentano nel riposo giusto, non nello sforzo continuo.",
  author: "Wakeify",
  note: "Alleggerisci oggi almeno un carico mentale o fisico che non è davvero necessario."
},

"26-06": {
  text: "La presenza non richiede tensione: richiede contatto con ciò che stai vivendo.",
  author: "Wakeify",
  note: "Riconnetti attenzione e movimento durante un’attività quotidiana svolta troppo spesso in automatico."
},

"27-06": {
  text: "L’energia più utile è quella che sai amministrare, non quella che esibisci.",
  author: "Wakeify",
  note: "Rinuncia per una sera a un eccesso che senti drenante per il corpo o per la mente."
},

"28-06": {
  text: "Un corpo ascoltato diventa una bussola più affidabile dell’impulsività.",
  author: "Wakeify",
  note: "Favorisci un sonno più pulito abbassando luci e stimoli almeno mezz’ora prima di dormire."
},

"29-06": {
  text: "Essere vivi non coincide con essere sempre pieni. Significa sapersi rigenerare.",
  author: "Wakeify",
  note: "Recupera un gesto semplice di benessere fisico che avevi abbandonato negli ultimi mesi."
},

"30-06": {
  text: "L’energia migliore è quella che ti permette di restare presente alla tua vita.",
  author: "Wakeify",
  note: "Chiudi il mese riconoscendo quale abitudine corporea o ritmica ti ha fatto sentire più stabile e vitale."
},
// LUGLIO
      "01-07": {
        text: "Il tempo è ciò che diamo in cambio a ciò che scegliamo di diventare.",
        author: "Carlos Castaneda — Wakeify",
        note: "Dedica oggi 10 minuti a qualcosa che ti avvicina alla persona che vuoi diventare."
      },
      "02-07": {
        text: "Diventa così bravo in ciò che fai… che non possano ignorarti.",
        author: "Steve Martin — Wakeify",
        note: "Allena oggi una micro-abilità del tuo talento per 10 minuti, senza distrazioni."
      },
      "03-07": {
        text: "Le persone forti non sono quelle che non cadono mai, ma quelle che si rialzano ogni volta che cadono.",
        author: "Confucio — Wakeify",
        note: "Riprendi oggi una cosa che avevi mollato dopo una caduta, anche solo per pochi minuti."
      },
      "04-07": {
        text: "Sii paziente con te stesso. La crescita interiore è un lavoro silenzioso e profondo.",
        author: "Sandra Carey — Wakeify",
        note: "Concediti oggi 2 minuti di pausa consapevole: respira, ascoltati, senza giudizio."
      },
      "05-07": {
        text: "Non smettere mai di fare del tuo meglio solo perché qualcuno non ti dà credito.",
        author: "Kamari aka Lyrikal — Wakeify",
        note: "Fai oggi una cosa importante senza dirlo a nessuno: la tua coerenza conta più del riconoscimento."
      },
      "06-07": {
        text: "La vita si restringe o si espande in proporzione al coraggio di ciascuno.",
        author: "Anaïs Nin — Wakeify",
        note: "Scegli un’azione che rimandi per paura e falla in versione ‘mini’, oggi."
      },
      "07-07": {
        text: "Non è necessario vedere l’intera scala. Inizia semplicemente a salire il primo gradino.",
        author: "Martin Luther King Jr. — Wakeify",
        note: "Definisci il primo micro-passaggio del tuo obiettivo e fallo entro stasera."
      },
      "08-07": {
        text: "La disciplina è scegliere tra ciò che vuoi ora e ciò che vuoi di più.",
        author: "Abraham Lincoln — Wakeify",
        note: "Riconosci una tentazione immediata e scegline consapevolmente una che serva al tuo lungo termine."
      },
      "09-07": {
        text: "Non aspettare. Il tempo non sarà mai giusto.",
        author: "Napoleon Hill — Wakeify",
        note: "Inizia oggi qualcosa che continui a rimandare ‘al momento giusto’, anche solo per 5 minuti."
      },
      "10-07": {
        text: "Be yourself; everyone else is already taken.",
        author: "Oscar Wilde — Wakeify",
        note: "Nota oggi un modo in cui ti stai adattando per compiacere gli altri e fai una piccola scelta più autentica."
      },

        text: "Non aspettare il momento perfetto. Coglilo e rendilo perfetto.",
        author: "George Bernard Shaw — Wakeify",
        note: "Prendi una situazione imperfetta di oggi e chiediti: cosa posso fare io per migliorarla del 10%?"
      },

        text: "Le difficoltà rafforzano la mente, come la fatica rafforza il corpo.",

// OTTOBRE
      "01-10": {
        text: "Il tempo è ciò che diamo in cambio a ciò che scegliamo di diventare.",
        author: "Carlos Castaneda — Wakeify",
        note: "Dedica oggi 10 minuti a qualcosa che ti avvicina alla persona che vuoi diventare."
      },
      "02-10": {
        text: "Diventa così bravo in ciò che fai… che non possano ignorarti.",
        author: "Steve Martin — Wakeify",
        note: "Allena oggi una micro-abilità del tuo talento per 10 minuti, senza distrazioni."
      },
      "03-10": {
        text: "Le persone forti non sono quelle che non cadono mai, ma quelle che si rialzano ogni volta che cadono.",
        author: "Confucio — Wakeify",
        note: "Riprendi oggi una cosa che avevi mollato dopo una caduta, anche solo per pochi minuti."
      },
      "04-10": {
        text: "Sii paziente con te stesso. La crescita interiore è un lavoro silenzioso e profondo.",
        author: "Sandra Carey — Wakeify",
        note: "Concediti oggi 2 minuti di pausa consapevole: respira, ascoltati, senza giudizio."
      },
      "05-10": {
        text: "Non smettere mai di fare del tuo meglio solo perché qualcuno non ti dà credito.",
        author: "Kamari aka Lyrikal — Wakeify",
        note: "Fai oggi una cosa importante senza dirlo a nessuno: la tua coerenza conta più del riconoscimento."
      },
      "06-10": {
        text: "La vita si restringe o si espande in proporzione al coraggio di ciascuno.",
        author: "Anaïs Nin — Wakeify",
        note: "Scegli un’azione che rimandi per paura e falla in versione ‘mini’, oggi."
      },
      "07-10": {
        text: "Non è necessario vedere l’intera scala. Inizia semplicemente a salire il primo gradino.",
        author: "Martin Luther King Jr. — Wakeify",
        note: "Definisci il primo micro-passaggio del tuo obiettivo e fallo entro stasera."
      },
      "08-10": {
        text: "La disciplina è scegliere tra ciò che vuoi ora e ciò che vuoi di più.",
        author: "Abraham Lincoln — Wakeify",
        note: "Riconosci una tentazione immediata e scegline consapevolmente una che serva al tuo lungo termine."
      },
      "09-10": {
        text: "Non aspettare. Il tempo non sarà mai giusto.",
        author: "Napoleon Hill — Wakeify",
        note: "Inizia oggi qualcosa che continui a rimandare ‘al momento giusto’, anche solo per 5 minuti."
      },
      "10-10": {
        text: "Be yourself; everyone else is already taken.",
        author: "Oscar Wilde — Wakeify",
        note: "Nota oggi un modo in cui ti stai adattando per compiacere gli altri e fai una piccola scelta più autentica."
      },
      "11-10": {
        text: "Non aspettare il momento perfetto. Coglilo e rendilo perfetto.",
        author: "George Bernard Shaw — Wakeify",
        note: "Prendi una situazione imperfetta di oggi e chiediti: cosa posso fare io per migliorarla del 10%?"
      },

    /**

     */
    
    /**
     * Restituisce la chiave "GG-MM" della data di oggi.
     * Esempio: 1 gennaio → "01-01", 25 dicembre → "25-12".
     */
    function getTodayKey() {
      const today = new Date();
      const day = String(today.getDate()).padStart(2, "0");
      const month = String(today.getMonth() + 1).padStart(2, "0");
      return `${day}-${month}`;
    }

    /**
     * Converte una Date in "GG-MM" (chiave calendario).
     */
    function keyFromDateObj(d) {
      const day = String(d.getDate()).padStart(2, "0");
      const month = String(d.getMonth() + 1).padStart(2, "0");
      return `${day}-${month}`;
    }

    /**
     * Converte una Date in "YYYY-MM-DD" (per input[type=date]).
     */
    function toISODate(d) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    /**
     * True se selected è nel futuro rispetto a today (confronto solo data, non orario).
     */
    function isFutureDate(selected, today) {
      const a = new Date(selected.getFullYear(), selected.getMonth(), selected.getDate()).getTime();
      const b = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
      return a > b;
    }

    /**
     * Renderizza una citazione dato un key "GG-MM".
     * Se manca, mostra fallback neutro.
     */
    function showQuoteByKey(key, fullDateLabelOverride = null, mode = "today") {
      const dateEl = document.getElementById("date-label");
      const textContentEl = document.getElementById("quote-text-content");
      const authorEl = document.getElementById("quote-author");
      const noteEl = document.getElementById("quote-note");
      const archiveModeEl = document.getElementById("archive-mode");

      if (fullDateLabelOverride) dateEl.textContent = fullDateLabelOverride;

      const quote = calendarQuotes[key];

      if (!quote) {
        textContentEl.textContent = "Nessuna citazione è stata ancora assegnata a questa data.";
        authorEl.textContent = "";
        noteEl.innerHTML = "<span>Spunto del giorno:</span> Puoi usare questo spazio per aggiungere una nuova frase nel tuo calendario Wakeify.";
        if (archiveModeEl) archiveModeEl.style.display = (mode === "archive") ? "block" : "none";
        return;
      }

      textContentEl.textContent = quote.text;
      authorEl.textContent = "— " + quote.author;
      noteEl.innerHTML = "<span>Spunto del giorno:</span> " + quote.note;

      if (archiveModeEl) archiveModeEl.style.display = (mode === "archive") ? "block" : "none";
    }

    function showQuoteForToday() {
      const today = new Date();
      const key = getTodayKey();

      // Data estesa in italiano per l'utente (es: lunedì 1 dicembre 2025)
      const fullDateLabel = today.toLocaleDateString("it-IT", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      showQuoteByKey(key, fullDateLabel, "today");
    }

    document.addEventListener("DOMContentLoaded", () => {
      // Citazione di oggi (comportamento attuale)
      showQuoteForToday();

      // Archivio (Opzione 1)
      const btnArchive = document.getElementById("btn-archive");
      const inputDate = document.getElementById("archive-date");
      const hint = document.getElementById("archive-hint");

      if (!btnArchive || !inputDate || !hint) return;

      const today = new Date();
      const startDate = new Date("2026-01-01T00:00:00");

      // Limiti calendario: non oltre oggi; non prima dell'inizio percorso (se oggi è prima, evita min > max)
      inputDate.max = toISODate(today);
      const minDate = (today < startDate) ? today : startDate;
      inputDate.min = toISODate(minDate);

      btnArchive.addEventListener("click", () => {
        // Se non scelto nulla, propone ieri (se possibile), altrimenti oggi
        if (!inputDate.value) {
          const d = new Date(today);
          d.setDate(d.getDate() - 1);
          inputDate.value = (d < minDate) ? toISODate(minDate) : toISODate(d);
        }
        inputDate.focus();
      });

      inputDate.addEventListener("change", () => {
        if (!inputDate.value) return;

        const selected = new Date(inputDate.value + "T00:00:00");

        if (isFutureDate(selected, today)) {
          hint.textContent = "Puoi consultare solo le citazioni fino a oggi.";
          return;
        }
        if (selected < minDate) {
          hint.textContent = "L’archivio parte dall’inizio del percorso.";
          return;
        }

        const key = keyFromDateObj(selected);
        const label = selected.toLocaleDateString("it-IT", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        });

        showQuoteByKey(key, label, "archive");
        hint.textContent = "Scegli un’altra data per rileggere altre citazioni.";
      });
    });
</script>
